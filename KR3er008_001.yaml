body:
  text: 卷上醫林改錯臟腑記敘古人曰既不能為良相願為良醫以良醫易而良相難余曰不然治國良相世代皆有著書良醫無一全人其所以無全人者因前人創著醫書臟腑錯誤後人遵行立論病本先失病本既失縱有繡虎雕龍之筆裁云補月之能病情與臟腑絕不相符此醫道無全人之由來也夫業醫診病當先明臟腑嘗閱古人臟腑論及所繪之圖立言處處自相矛盾如古人論脾胃脾屬土土主靜而不宜動脾動則不安既云脾動不安何得下文又言脾聞聲則動動則磨胃化食脾不動則食不化論脾之動靜其錯誤如是其論肺虛如蜂窠下無透竅吸之則滿呼之則虛既云下無透竅何得又云肺中有二十四孔行列分布以行諸臟之氣論肺之孔竅其錯誤又如是其論腎有兩枚即腰子兩腎為腎中間動氣為命門既雲中間動氣為命門何得又云左腎為腎右腎為命門兩腎一體如何兩立其名有何憑據若以中間動氣為命門藏動氣者又何物也其論腎錯誤又如是其論肝左右有兩經即血管從兩脅肋起上貫頭目下由少腹環繞陰器至足大趾而止既云肝左右有兩經何得又云肝居於左左脅屬肝論肝分左右其錯誤又如是其論心為君主之官神明出焉意藏於心意是心之機意之所專曰志志之動變曰思以思謀遠曰慮用慮處物曰智五者皆藏於心既藏於心何得又云脾藏意智腎主伎巧肝主謀慮膽主決斷據所論處處皆有靈機究竟未說明生靈機者何物藏靈機者何所若用靈機外有何神情其論心如此含混其論胃主腐熟水穀又云脾動磨胃化食胃之上口名曰賁門飲食入胃精氣從賁門上輸於脾肺宣播於諸脈此段議論無情無理胃下口名曰幽門即小腸上口其論小腸為受盛之官化物出焉言飲食入小腸化糞下至闌門即小腸下口分別清濁糞歸大腸自肛門出水歸膀胱為尿如此論尿從糞中滲出其氣當臭嘗用童子小便並問及自飲小便之人只言味鹹其氣不臭再者食與水合化為糞糞必稀溏作瀉在雞鴨無小便則可在馬牛有小便則不可何況乎人看小腸化食水自闌門出一節真是千古笑談其論心包絡細筋如絲與心肺相連者心包絡也又云心外黃脂是心包絡又云心下橫膜之上豎膜之下黃脂是心包絡又云膻中有名無形者乃心包絡也既云有名無形何得又云手中指之經乃是手厥陰心包絡之經也論心包絡竟有如許之多究竟心包絡是何物何能有如許之多耶其論三焦更為可笑靈樞曰手少陰三焦主乎上足太陽三焦主乎下已是兩三焦矣難經三十一難論三焦上焦在胃之上主內而不出中焦在胃中脘主腐熟水穀下焦在臍下主分別清濁又云三焦者水穀之道路此論三焦是有形之物又云兩腎中間動氣是三焦之本此論三焦是無形之氣在難經一有形一無形又是兩三焦王叔和所謂有名無狀之三焦者蓋由此也至陳無擇以臍下脂膜為三焦袁淳甫以人身著內一層形色最赤者為三焦虞天民指空腔子為三焦金一龍有前三焦後三焦之論論三焦者不可以指屈有形無形諸公尚無定準何得雲手無名指之經是手少陽三焦之經也其中有自相矛盾者有後人議駁而未當者總之本源一錯萬慮皆失余嘗有更正之心而無臟腑可見自恨著書不明臟腑豈不是癡人說夢治病不明臟腑何異於盲子夜行雖竭思區畫無如之何十年之久念不少忘至嘉慶二年丁巳餘年三十四月初旬遊於灤州之稻地鎮其時彼處小兒正染瘟疹痢症十死八九無力之家多半用代席裹埋代席者代棺之席也彼處鄉風更不深埋意在犬食利於下胎不死故各義塚中破腹露臟之兒日有百餘余每日壓馬過其地初未嘗不掩鼻後因念及古人所以錯論臟腑皆由未嘗親見遂不避汙穢每日清晨赴其義塚就群兒之露臟者細視之犬食之餘大約有腸胃者多有心肝者少互相參看十人之內看全不過三人連視十日大約看全不下三十餘人始知醫書中所繪臟腑形圖與人之臟腑全不相合即件數多寡亦不相符惟胸中膈膜一片其薄如紙最關緊要及余看時皆以破壞未能驗明在心下心上是斜是正最為遺憾至嘉慶四年六月余在奉天府有遼陽州一婦年二十六歲因瘋疾打死其夫與翁解省擬剮跟至西關忽然醒悟以彼非男子不忍近前片刻行刑者提其心與肝肺從面前過細看與前次所看相同後余在京時嘉慶庚辰年有打死其母之剮犯行刑于崇文門外吊橋之南卻得近前及至其處雖見臟腑膈膜已破仍未得見道光八年五月十四日剮逆犯張格爾及至其處不能近前自思一簣未成不能終止不意道光九年十二月十三日夜間有安定門大街板廠衚衕恆宅請余看症因談及膈膜一事留心四十年未能審驗明確內有江寧布政司恆敬公言伊曾鎮守哈密領兵於喀什噶爾所見誅戮逆屍最多於膈膜一事知之最悉余聞言喜出望外即拜叩而問之恆公鑑余苦衷細細說明形狀余於臟腑一事訪驗四十二年方得的確繪成全圖意欲刊行於世惟恐後人未見臟腑議余故叛經文欲不刊行復慮後世業醫受禍相沿又不知幾千百年細思黃帝慮生民疾苦平素以靈樞之言下問岐伯鬼臾區故名素問二公如知之的確可對君言知之不確須待參考何得不知妄對遺禍後世繼而秦越人著難經張世賢割裂河圖洛書為之圖注謂心肝肺以分兩計之每件重幾許大小腸以尺丈計之每件長若干胃大幾許容谷幾鬥幾升其言彷彿是真其實臟腑未見以無憑之談作欺人之事利己不過虛名損人卻屬實禍竊財猶謂之盜偷名豈不為賊千百年後豈無知者今余刻此圖並非獨出己見評論古人之短長非欲後人知我亦不避後人罪我惟願醫林中人一見此圖胸中雪亮眼底光明臨症有所遵循不致南轅北轍出言含混病或少失是吾之厚望幸仁人君子鑑而諒之時道光庚寅孟冬直隸玉田縣王清任書於京邸知一堂古人臟腑圖古人所繪臟腑圖形如此肺六葉兩耳凡八葉膽附於肝之短葉肝左三葉右四葉凡七葉親見改正臟腑圖余將親見諸臟腑顯隱之形繪於其後計四十二件左氣門右氣門兩管歸中一管念由心左轉出橫行後接衛總管心長在氣管之下非在肺管之下心與肺葉上稜齊肺管至肺分兩杈入肺兩葉直貫到底皆有節管內所存皆輕浮白沫如豆腐沫有形無體兩六葉大面向背小面向胸上有四尖向胸下一小片亦向胸肺外皮實無透竅亦無行氣之二十四孔膈膜以上僅止肺心左右氣門余無他物其餘皆膈膜以下物人身膈膜是上下界物肝四葉膽附於肝右邊第二葉總提長於胃上肝又長於總提之上大面向上後連於脊肝體堅實非腸胃膀胱可比絕不能藏血胃府之體質上口賁門在胃上正中下口幽門亦在胃上偏右幽門之左寸許名津門胃內津門之左有疙瘩如棗名遮食胃外津門左名總提肝連於其上胃在腹是平鋪臥長上口向脊下口向右底向腹連出水道脾中有一管體象玲瓏易於出水故名瓏管脾之長短與胃相等脾中間一管即是瓏管另畫瓏管者謂有出水道令人易辨也氣府俗名雞冠油下稜抱小腸氣府內小腸外乃存元氣之所元氣化食人身生命之源全在於此此係小腸外有氣府包裹之中是瓏管水由瓏管分流兩邊出水道由出水道滲出沁入膀胱為尿出水道中有回血管其餘皆系水管大腸上口即小腸下口名闌門大腸下口即肛門膀胱有下口無上口下口歸玉莖精道下孔亦歸玉莖精道在婦女名子宮兩腎凹處有氣管兩根通衛總管兩旁腎體堅實內無孔竅絕不能藏精舌後白片名曰會厭乃遮蓋左右氣門喉門之物古人言經絡是血管由每臟腑向外長兩根惟膀胱長四根余親見百餘臟腑並無向外長血管之形故書於圖後以記之會厭左氣門右氣門衛總管榮總管氣府血府記欲知臟腑體質先明出氣入氣與進飲食之道路古人謂舌根後名曰喉喉者候也候氣之出入即肺管上口是也喉之後名曰咽咽者嚥也嚥飲食入胃即胃管上口是也謂咽以納食喉以納氣為千古不易之定論自靈素至今四千年來無人知其錯而改正者如咽嚥飲食入胃人所共知惟喉候氣之出入一節殊欠明白不知肺兩葉大面向背上有四尖向胸下一小片亦向胸肺管下分為兩杈入肺兩葉每杈分九中杈每中杈分九小杈每小杈長數小枝枝之盡頭處並無孔竅其形彷彿麒麟菜肺外皮亦無孔竅其內所存皆輕浮白沫肺下實無透竅亦無行氣之二十四孔先賢論吸氣則肺滿呼氣則肺虛此等錯誤不必細辨人氣向里吸則肚腹滿大非肺滿大氣向外呼則肚腹虛小非肺虛小出氣入氣吐痰吐飲唾津流涎與肺毫無干涉肺管之後胃管之前左右兩邊凹處有氣管兩根其粗如箸上口在會厭之下左曰左氣門右曰右氣門痰飲津涎由此氣管而出古人誤以咳嗽喘急哮吼等症為肺病者因見其症自胸中來再者臨症查有外感用發散而愈有燥痰用清涼而愈有積熱用攻下而愈有氣虛用補中而愈有陰虧用滋陰而愈有瘀血用逐瘀而愈揚揚得意立言著書以為肺病無疑不知左氣門右氣門兩管由肺管兩旁下行至肺管前面半截處歸併一根如樹兩杈歸一本形粗如箸下行入心由心左轉出粗如筆管從心左後行由肺管左邊過肺入脊前下行至尾骨名曰衛總管俗名腰管自腰以下向腹長兩管粗如箸上一管通氣府俗名雞冠油如倒提雞冠花之狀氣府乃抱小腸之物小腸在氣府是橫長小腸外氣府內乃存元氣之所元氣即火火即元氣此火乃人生命之源食由胃入小腸全仗元氣蒸化元氣足則食易化元氣虛則食難化此記向腹之上一管下一管大約是通男子之精道女子之子宮獨此一管細心查看未能查驗的確所以疑似以俟後之業醫者倘遇機會細心查看再補衛總管對背心兩邊有兩管粗如箸向兩肩長對腰有兩管通連兩腎腰下有兩管通兩胯腰上對脊正中有十一支管連脊此管皆行氣行津液氣足火旺將津液煎稠稠者名曰痰氣虛火衰不能煎熬津液津液必稀稀者名曰飲痰飲在管總以管中之氣上攻上行過心由肺管前氣管中出左右氣門痰飲津涎本氣管中物古人何以誤為肺中物因不知肺管前有氣管相連而長止知痰飲津涎自胸中來便疑為肺中物總是未親見臟腑之故手握足步頭轉身搖用行舍藏全憑此氣人氣向里吸則氣府滿氣府滿則肚腹大氣向外呼則氣府虛氣府虛則肚腹小衛總管行氣之府其中無血若血歸氣府血必隨氣而出上行則吐血衄血下行則溺血便血衛總管之前相連而長粗如箸名曰榮總管即血管盛血與衛總管長短相等其內之血由血府灌溉血府即人胸下膈膜一片其薄如紙最為堅實前長與心口凹處齊從兩脅至腰上順長如坡前高後低低處如池池中存血即精汁所化名曰血府精汁詳胃津門條下前所言會厭即舌後之白片乃遮蓋左右氣門喉門之物也津門津管遮食總提瓏管出水道記嚥下胃之一物在禽名曰嗉在獸名曰肚在人名曰胃古人畫胃圖上口在胃上名曰賁門下口在胃下名曰幽門言胃上下兩門不知胃是三門畫胃豎長不知胃是橫長不但橫長在腹是平鋪臥長上口賁門向脊下底向腹下口幽門亦在胃上偏右脅向脊幽門之左寸許另有一門名曰津門津門上有一管名曰津管是由胃出精汁水液之道路津管一物最難查看因上有總提遮蓋總提俗名胰子其體長於賁門之右幽門之左正蓋津門總提下前連氣府接小腸後接提大腸在胃上後連肝肝連脊此是膈膜以下總提連貫胃肝大小腸之體質飲食入胃食留於胃精汁水液先由津門流出入津管津管寸許外分三杈精汁清者入髓府化髓精汁濁者由上杈臥則入血府隨血化血其水液由下杈從肝之中間穿過入脾脾中間有一管體相玲瓏名曰瓏管水液由瓏管分流兩邊入出水道出水道形如魚網俗名網油水液由出水道滲出沁入膀胱化而為尿出水道出水一段體查最難自嘉慶二年看臟腑時出水道有滿水鈴鐺者有無水鈴鐺者於理不甚透徹以後診病查看久病壽終之人臨時有多飲水者有少飲水者有不飲水者故後其水仍然在腹以此與前所看者參考與出水道出水一節雖然近理仍不敢為定準後以畜較之遂喂遂殺之畜網油滿水鈴鐺三四日不喂之畜殺之無水鈴鐺則知出水道出水無疑前言飲食入胃食留於胃精汁水液自津門流出津門既孔如箸大能向外流精汁水液稀粥豈不能流出津門雖孔如箸大其處胃體甚厚四圍靠擠縮小所以水能出而食不能出況胃之內津門之左一分遠有一疙瘩形如棗大名曰遮食乃擋食放水之物待精汁水液流盡食方腐熟漸入小腸化而為糞小腸何以化食為糞小腸外有氣府氣府氣抱小腸小腸外氣府內乃存元氣之所元氣化食此處與前氣府參看化糞入大腸自肛門出此篇記精汁由胃出津門生精生血水液由瓏管出水道入膀胱為尿食由胃入小腸元氣蒸化為糞之原委也腦髓說靈機記性不在心在腦一段本不當說縱然能說必不能行欲不說有許多病人不知源始至此又不得不說不但醫書論病言靈機發於心即儒家談道德言性理亦未有不言靈機在心者因始創之人不知心在胸中所辦何事不知咽喉兩旁有氣管兩根行至肺管前歸併一根入心由心左轉出過肺入脊名曰衛總管前通氣府精道後通脊上通兩肩中通兩腎下通兩腿此管乃存元氣與津液之所氣之出入由心所過心乃出入氣之道路何能生靈機貯記性靈機記性在腦者因飲食生氣血長肌肉精汁之清者化而為髓由脊骨上行入腦名曰腦髓盛腦髓者名曰髓海其上之骨名曰天靈蓋兩耳通腦所聽之聲歸於腦腦氣虛腦縮小腦氣與耳竅之氣不接故耳虛聾耳竅通腦之道路中若有阻滯故耳實聾兩目即腦汁所生兩目系如線長於腦所見之物歸於腦瞳人白色是腦汁下注名曰腦汁入目鼻通於腦所聞香臭歸於腦腦受風熱腦汁從鼻流出涕濁氣臭名曰腦漏看小兒初生時腦未全囟門軟目不靈動耳不知聽鼻不知聞舌不言至周歲腦漸生囟門漸長耳稍知聽目稍有靈動鼻微知香臭舌能言一二字至三四歲腦髓漸滿囟門長全耳能聽目有靈動鼻知香臭言語成句所以小兒無記性者腦髓未滿高年無記性者腦髓漸空李時珍曰腦為元神之府金正希曰人之記性皆在腦中汪訒庵曰今人每記憶往事必閉目上瞪而思索之腦髓中一時無氣不但無靈機必死一時一刻無氣必死一刻試看癇症俗名羊羔風即是元氣一時不能上轉入腦髓抽時正是活人死腦袋活人者腹中有氣四肢抽搐死腦袋者腦髓無氣耳聾眼天吊如死有先喊一聲而後抽者因腦先無氣胸中氣不知出入暴向外出也正抽時胸中有漉漉之聲者因津液在氣管腦無靈機之氣使津液吐咽津液逗留在氣管故有此聲抽後頭疼昏睡者氣雖轉入於腦尚未足也小兒久病後元氣虛抽風大人暴得氣厥皆是腦中無氣故病人毫無知識以此參考豈不是靈機在腦之證據乎氣血合脈說脈之形余以實情告後人若違心裝神仙喪天良評論必遭天誅氣府存氣血府存血衛總管由氣府行周身之氣故名衛總管榮總管由血府行周身之血故名榮總管衛總管體厚形粗長在脊骨之前與脊骨相連散布頭面四肢近筋骨長即周身氣管榮總管體薄形細長在衛總管之前與衛總管相連散布頭面四肢近皮肉長即周身血管氣在氣府有出有入出入者呼吸也目視耳聽頭轉身搖掌握足步靈機使氣之動轉也血自血府入榮總管由榮總管灌入周身血管滲於管外長肌肉也氣管近筋骨生內藏難見血管近皮肉長外露易見氣管行氣氣行則動血管盛血靜而不動頭面四肢按之跳動者皆是氣管並非血管如兩眉稜骨後凹處俗名兩太陽是處肉少皮連骨按之跳動是通頭面之氣管兩足大指次指之端是處肉少皮連骨按之跳動是通兩足之氣管兩手腕橫紋高骨之上是處肉少皮連骨按之跳動是通兩手之氣管其管有粗有細有直有曲各人體質不同胳膊肘下近手腕肉厚氣管外露者短胳膊肘下近手腕肉薄氣管外露者長如外感中人風入氣管其管必粗按之出膚寒入氣管管中津液必凝凝則阻塞其氣按之跳動必慢火入氣管火氣上炙按之跳動必急人壯邪氣勝管中氣多按之必實大有力人弱正氣衰管中氣少按之必虛小無力久病無生機之人元氣少僅止上行頭面兩手無氣下行故足面按之不動若兩手腕氣管上按之似有似無或細小如絲或指下微微亂動或按之不動忽然一跳皆是氣將絕之時此段言人之氣管生平有粗細曲直之不同管有短長者因手腕之肉有薄厚也按之大小者虛實也跳動之急慢者寒火之分也前所言明明是脈不言脈者因前人不知有左氣門右氣門血府氣府衛總管榮總管津門津管總提遮食瓏管出水道在腹是何體質有何用處論臟腑包絡未定準是何物論經絡三焦未定準是何物並不能指明經絡是氣管血管論脈理首句便言脈為血府百骸貫通言脈是血管氣血在內流通周而復始若以流通而論此處血真能向彼處流彼處當有空隙之地有空隙之地則是血虛無空隙之地血流歸於何處古人並不知脈是氣管竟著出許多脈訣立言雖多論部位一人一樣並無相同者古人論脈二十七字余不肯深說者非謂古人無容足之地恐後人對症無論脈之言診脈斷死生易知病難治病之要訣在明白氣血無論外感內傷要知初病傷人何物不能傷臟腑不能傷筋骨不能傷皮肉所傷者無非氣血氣有虛實實者邪氣實虛者正氣虛正氣虛當與半身不遂門四十種氣虛之症小兒抽風門二十種氣虛之症互相參考血有虧瘀血虧必有虧血之因或因吐血衄血或溺血便血或破傷流血過多或崩漏產後傷血過多若血瘀有血瘀之症可查後有五十種血瘀症互相參考惟血府之血瘀而不活最難分別後半日發燒前半夜更甚後半夜輕前半日不燒此是血府血瘀血瘀之輕者不分四段惟日落前後燒兩時再輕者或燒一時此內燒兼身熱而言若午後身涼發燒片刻乃氣虛參耆之症若天明身不熱發燒止一陣乃參附之症不可混含從事心無血說余友薛文煌字朗齋通州人素知醫道光十年二月因赴山東來舍辭行閒談言及古人論生血之源有言心生血脾統血者有言脾生血心統血者不知宗誰余曰皆不可宗血是精汁入血府所化心乃是出入氣之道路其中無血朗齋曰吾兄所言不實諸物心皆有血何獨人心無血余曰弟指何物心有血曰古方有遂心丹治癲狂用甘遂末以豬心血和為丸豈不是豬心有血之憑據余曰此古人之錯非心內之血因刀刺破其心腔子內血流入於心看不刺破之心內並無血余見多多試看殺羊者割其頸項不刺心心內亦無血又曰不刺心何死之速余曰滿腔血從刀口流所以先流者速繼而周身血退還腔子所以後流者遲血盡氣散故死之速如人鬥毆破傷流血過多氣散血亡漸至抽風古人立名曰破傷風用散風藥治死受傷者凶手擬抵治一個即是死兩個若明白氣散血亡之義即用黃耆半斤黨參四兩大補其氣救一人豈不是救兩人朗齋點首而別方敘余不論三焦者無其事也在外分頭面四肢周身血管在內分膈膜上下兩段膈膜以上心肺咽喉左右氣門其餘之物皆在膈膜以下立通竅活血湯治頭面四肢周身血管血瘀之症立血府逐瘀湯治胸中血府血瘀之症立膈下逐瘀湯治肚腹血瘀之症病有千狀萬態不可以余為全書查證有王肯堂證治準繩查方有周定王朱橚普濟方查藥有李時珍本草綱目三書可謂醫學之淵源可讀可記有國朝之醫宗金鑑理足方效有吳又可瘟疫論其餘名家雖未見臟腑而攻發補瀉之方效者不少余何敢云著書不過因著醫林改錯臟腑圖記後將平素所治氣虛血瘀之症記數條示人以規矩並非全書不善讀者以余之書為全書非余誤人是誤余也通竅活血湯所治症目通竅活血湯所治之病開列於後頭髮脫落傷寒瘟病後頭髮脫落名醫書皆言傷血不知皮里肉外血瘀阻塞血路新血不能養髮故發脫落無病脫髮亦是血瘀用藥三副發不脫十副必長新發眼疼白珠紅眼疼白珠紅俗名暴發火眼血為火燒凝於目珠故白珠紅色無論有云翳無雲翳先將此藥吃一副後吃加味止痛沒藥散一日二副三兩日必痊愈糟鼻子色紅是瘀血無論三二十年此方服三副可見效二三十副可痊愈舍此之外並無驗方耳聾年久耳孔內小管通腦管外有瘀血靠擠管閉故耳聾晚服此方早服通氣散一日兩副三二十年耳聾可愈白癜風血瘀於皮里服三五副可不散漫再服三十副可痊紫癜風血瘀於膚里治法照白癜風無不應手取效紫印臉臉如打傷血印色紫成片或滿臉皆紫皆血瘀所致如三五年十副可愈若十餘年三二十副必愈青記臉如墨血瘀症長於天庭者多三十副可愈白癜紫癜紫印青記自古無良方者不知病源也牙疳牙者骨之餘養牙者血也傷寒瘟疫痘疹痞塊皆能燒血血瘀牙床紫血死牙床黑血死牙脫人豈能活再用涼藥凝血是促其死也遇此症將此藥晚服一副早服血府逐瘀湯一副白日煎黃耆八錢徐徐服之一日服完一日三副三日可見效十日大見效一月可痊愈縱然牙脫五七個不穿腮者皆可活出氣臭血府血瘀血管血必瘀氣管與血管相連出氣安得不臭即風從花里過來香之義晚服此方早服血府逐瘀湯三五日必效無論何病聞出臭氣照此法治婦女干勞經血三四月不見或五六月不見咳嗽急喘飲食減少四肢無力午後發燒至晚尤甚將此方吃五副或六副至重者九副未有不痊愈者男子勞病初病四肢痠軟無力漸漸肌肉消瘦飲食減少面色黃白咳嗽吐沫心煩急躁午後潮熱天亮汗多延醫調治始而滋陰繼而補陽補之不效則云虛不受補無可如何可笑著書者不分別因弱致病因病致弱果系傷寒瘟疫大病後氣血虛弱因虛弱而病自當補弱而病可痊本不弱而生病因病久致身弱自當去病病去而元氣自復查外無表症內無里症所見之症皆是血瘀之症常治此症輕者九副可愈重者十八副可愈吃三副後如果氣弱每日煎黃耆八錢徐徐服之一日服完此攻補兼施之法若氣不甚弱黃耆不必用以待病去元氣自復交節病作無論何病交節病作乃是瘀血何以知其是瘀血每見因血結吐血者交節亦發故知之服三副不發小兒疳證疳病初起尿如米泔午後潮熱日久青筋暴露肚大堅硬面色青黃肌肉消瘦皮毛憔悴眼睛發䀽古人以此症在大人為勞病在小兒為疳疾照前症再添某病則曰某疳如脾疳疳瀉疳腫疳痢肝疳心疳疳渴肺疳腎疳疳熱腦疳眼疳鼻疳牙疳脊疳蛔疳無辜疳丁奚疳哺露疳分病十九條立五十方方內多有梔子黃連羚羊石膏大寒之品因論病源系乳食過飽肥甘無節停滯中脘傳化遲滯腸胃漸傷則生積熱熱盛成疳則消耗氣血煎灼津液故用大寒以清積熱余初時對症用方無一效者後細閱其論因飲食無節停滯中脘此論是停食不宜大寒之品以傳化遲滯腸胃漸傷則生積熱之句而論當是虛熱又不宜用大寒之品後遇此症細心審查午後潮熱至晚尤甚乃瘀血也青筋暴露非筋也現於皮膚者血管也血管青者內有瘀血至肚大堅硬成塊皆血瘀凝結而成用通竅活血湯以通血管用血府逐瘀湯去午後潮熱用膈下逐瘀湯消化積塊三方輪服未有不愈者通竅活血湯赤芍一錢川芎一錢桃仁三錢研泥紅花三錢老蔥三根切碎鮮姜三錢切碎紅棗七個去核麝香五釐絹包用黃酒半斤將前七味煎一盅去渣將麝香入酒內再煎二沸臨臥服方內黃酒各處分兩不同寧可多二兩不可少煎至一盅酒亦無味雖不能飲酒之人亦可服方內麝香市井易於作假一錢真可合一兩假人又不能辨此方麝香最要緊多費數文必買好的方妥若買當門子更佳大人一連三晚吃三副隔一日再吃三副若七八歲小兒兩晚吃一副三兩歲小兒三晚吃一副麝香可煎三次再換新的方歌通竅全憑好麝香桃紅大棗老蔥姜川芎黃酒赤芍藥表裡通經第一方加味止痛沒藥散治初起眼疼白珠紅後起雲翳沒藥三錢血竭三錢大黃三錢朴硝二錢石決明三錢煅為末分四副早晚清茶調服眼科外症千古一方通氣散治耳聾不聞雷聲餘三十歲立此方柴胡一兩香附一兩川芎五錢為末早晚開水沖服三錢血府逐瘀湯所治症目血府逐瘀湯所治之病開列於後頭痛頭痛有外感必有發熱惡寒之表症發散可愈有積熱必舌乾口渴用承氣可愈有氣虛必似痛不痛用參耆可愈查患頭疼者無表症無里症無氣虛痰飲等症忽犯忽好百方不效用此方一劑而愈胸疼胸疼在前面用木金散可愈後通背亦疼用栝蔞薤白白酒湯可愈在傷寒用栝蔞陷胸柴胡等皆可愈有忽然胸疼前方皆不應用此方一副疼立止胸不任物江西巡撫阿霖公年七十四夜臥露胸可睡蓋一層布壓則不能睡已經七年召余診之此方五副痊愈胸任重物一女二十二歲夜臥令僕婦坐於胸方睡已經二年余亦用此方三副而愈設一齊問病源何以答之天亮出汗醒後出汗名曰自汗因出汗醒名曰盜汗盜散人之氣血此是千古不易之定論竟有用補氣固表滋陰降火服之不效而反加重者不知血瘀亦令人自汗盜汗用血府逐瘀湯一兩副而汗止食自胸右下食自胃管而下宜從正中食入咽有從胸右邊嚥下者胃管在肺管之後仍由肺葉之下轉入肺前由肺下至肺前出膈膜入腹肺管正中血府有瘀血將胃管擠靠於右輕則易治無礙飲食也重則難治擠靠胃管彎而細有礙飲食也此方可效痊愈難心裡熱名曰燈籠病身外涼心裡熱故名燈籠病內有血瘀認為虛熱愈補愈瘀認為實火愈涼愈凝三兩副血活熱退瞀悶即小事不能開展即是血瘀三副可好急躁平素和平有病急躁是血瘀一二副必好夜睡夢多夜睡夢多是血瘀此方一兩副痊愈外無良方呃逆俗名打咯忒因血府血瘀將通左氣門右氣門歸併心上一根氣管從外擠嚴吸氣不能下行隨上出故呃氣若血瘀甚氣管閉塞出入之氣不通悶絕而死古人不知病源以橘皮竹茹湯承氣湯都氣湯丁香柿蒂湯附子理中湯生薑瀉心湯代赭旋覆湯大小陷胸等湯治之無一效者相傳咯忒傷寒咯忒瘟病必死醫家因古無良法見此症則棄而不治無論傷寒瘟疫雜症一見呃逆速用此方無論輕重一副即效此余之心法也飲水即嗆飲水即嗆乃會厭有血滯用此方極效古人評論全錯余詳於痘症條不眠夜不能睡用安神養血藥治之不效者此方若神小兒夜啼何得白日不啼夜啼者血瘀也此方一兩副痊愈心跳心忙心跳心忙用歸脾安神等方不效用此方百發百中夜不安夜不安者將臥則起坐未穩又欲睡一夜無寧刻重者滿床亂滾此血府血瘀此方服十餘副可除根俗言肝氣病無故愛生氣是血府血瘀不可以氣治此方應手效乾嘔無他症惟乾嘔血瘀之症用此方化血而嘔立止晚發一陣熱每晚內熱兼皮膚熱一時此方一副可愈重者兩副血府逐瘀湯當歸三錢生地三錢桃仁四錢紅花三錢枳殼二錢赤芍二錢柴胡一錢甘草一錢桔梗一錢半川芎一錢半牛膝三錢水煎服方歌血府當歸生地桃紅花甘草殼赤芍柴胡芎桔牛膝等血化下行不作勞膈下逐瘀湯所治症目膈下逐瘀湯所治之症開列於後積塊積聚一症不必論古人立五積六聚七癥八瘕之名亦不議駁其錯駁之未免過煩今請問在肚腹能結塊者是何物若在胃結者必食也在腸結者燥糞也積塊日久飲食仍然如故自然不在腸胃之內必在腸胃之外腸胃之外無論何處皆有氣血氣有氣管血有血管氣無形不能結塊結塊者必有形之血也血受寒則凝結成塊血受熱則煎熬成塊豎血管凝結則成豎條橫血管凝結則成橫條橫豎血管皆凝結必接連成片片凝日久厚而成塊既是血塊當發燒要知血府血瘀必發燒血府血之根本瘀則殞命肚腹血瘀不發燒肚腹血之梢末雖瘀不致傷生無論積聚成塊在左肋右肋臍左臍右臍上臍下或按之跳動皆以此方治之無不應手取效病輕者少服病重者多服總是病去藥止不可多服倘病人氣弱不任克消原方加黨參三五錢皆可不必拘泥小兒痞塊小兒痞塊肚大青筋始終總是血瘀為患此方與前通竅活血湯血府逐瘀湯三方輪轉服之月餘未有不成功者痛不移處凡肚腹疼痛總不移動是血瘀用此方治之極效臥則腹墜病人夜臥腹中似有物左臥向左邊墜右臥向右邊墜此是內有血瘀以此方為主有雜症兼以他藥腎瀉五更天泄三兩次古人名曰腎泄言是腎虛用二神丸四神丸等藥治之不效常有三五年不愈者病不知源是難事也不知總提上有瘀血臥則將津門擋嚴水不能由津門出由幽門入小腸與糞合成一處糞稀溏故清晨瀉三五次用此方逐總提上之瘀血血活津門無擋水出瀉止三五副可痊愈久瀉瀉肚日久百方不效是總提瘀血過多亦用此方膈下逐瘀湯靈脂二錢炒當歸三錢川芎二錢桃仁三錢研泥丹皮二錢赤芍二錢烏藥二錢元胡一錢甘草三錢香附錢半紅花三錢枳殼錢半水煎服方歌膈下逐瘀桃牡丹赤芍烏藥元胡甘歸芎靈脂紅花殼香附開鬱血亦安
