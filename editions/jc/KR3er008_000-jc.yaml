front:
  text: 張序醫仁術也乃或術而無仁則貪醫足以誤世或仁而無術則庸醫足以殺人古云不服藥為中醫蓋誠慮乎醫之仁術難兼也至於稍讀方書即行市道全無仁術奚以醫為余來粵數年目擊此輩甚眾輒有慨乎其中每遇救急良方不惜捐資購送今於癸丑四月適聞佛山友人有幼子患症醫以風藥投之竟至四肢抽搐口眼歪斜命垂旦夕忽得一良方一劑稍愈三服霍然又有人患半身不遂者十餘年得一良方行走如故余甚奇之再四訪求始知二方皆出醫林改錯一書遍求得之歷試多驗因於公餘沉潛反覆頗悟其旨竊嘆此書之作直翻千百年舊案正其謬誤決其瑕疵為希世之寶也豈非術之精而仁之至哉余不忍秘藏立刊布以公於世使今人得悉臟腑經絡之實而免受庸醫之誤亦不負王勳臣先生數十年濟世之苦心矣願同志君子勿視為尋常善書幸甚幸甚咸豐癸丑仲夏順天張潤坡識劉序丁未之秋寄跡吳門適同鄉焦子浚文來手執臟腑全圖乃勳臣王先生醫林改錯之稿也臟腑圖漢魏以來醫家所習見何異乎爾異乎勳臣先生所繪之圖與古人殊也臟腑人人皆同勳臣背古人以傳圖得毋炫奇立異乎曰否不然也古人之圖傳其誤勳臣之圖傳其信天下物理之是非聞虛而見實寡見猶虛多見為實古人竊諸刑餘之一犯勳臣得諸親見之百人集數十載之精神改正乎數千年之遺誤譬諸清夜鐘鳴當頭棒喝夢夢者皆為之喚醒焉醫書汗牛充棟豈儘可徵然非善讀書者獨具支眼終為古人所牢籠而潛受其欺孟子曰吾於武城取二二策武城周書也孟子周人也當代之書猶且不可盡信況遠者乎是書繪圖立說定方救逆理精識卓絕後空前可為黃帝之功臣即可為長沙之畏友抑又聞之葉氏指南有久病入絡之說徐氏非之不知入絡即血瘀也今勳臣痛快言之而指南入絡之說益明坊友汪子維之見而悅之開雕梨棗以公諸世斯真能刊錄善書者也是為序道光戊申中秋日上元后學小窗氏劉必榮識知非子序余讀勳臣先生醫林改錯一書而嘆天下事有人力為之者有天意成之者先生是書功莫大於圖繪臟腑諸形其所以能繪諸形者則由於親見其所以得親見者則由於稻地鎮之一遊也此豈非天假之緣而使數千載之誤由先生而正之哉帷膈膜一事留心三十年未能查驗的確又得恆敬公確示一切而後臟腑諸形得以昭晰無疑此非有天意玉成其間哉至先生立方醫疾大抵皆以約治博上卷著五十種血瘀之症以三方治之下卷論半身不遂以一方治之並審出未病以前四十種氣虛之形症非細心何能至此論吐瀉轉筋治分攻補兩途方由試驗中來論小兒抽風非中風以大補元氣一方治之以不能言之兒查出二十種氣虛之形症平素細心不問可知論痘非胎毒痘漿非血化以六方治古人不治之六十種逆痘頗有效者先生之書大抵補前人之未及而在氣虛血瘀之症為多今特揭諸篇首知非子書自序余著醫林改錯一書非治病全書乃記臟腑之書也其中當尚有不實不盡之處後人倘遇機會親見臟腑精察增補抑又幸矣記臟腑後兼記數症不過示人以規矩今人知外感內傷傷人何物有餘不足是何形狀至篇中文義多粗淺者因業醫者學問有深淺也前後語句多復重者恐心粗者前後不互證也如半身不遂內有四十種氣虧之症小兒抽風門有二十種氣虛之症如遇雜症必於六十種內互考參觀庶免謬誤望閱是書者須詳審焉玉田王清任書
