body:
  text: 卷下半身不遂論敘醫家立言著書心存濟世者乃良善之心也必須親治其症屢驗方法萬無一失方可傳與後人若一症不明留與後人再補斷不可徒取虛名恃才立論病未經見揣度立方倘病不知源方不對症是以活人之心遺作殺人之事可不畏歟如傷寒瘟疫雜症婦科古人各有所長對症用方多半應手取效其中稍有偏見不過白玉微瑕惟半身不遂一症古之著書者雖有四百餘家於半身不遂立論者僅止數人數人中並無一人説明病之本源病不知源立方安得無錯余少時遇此症始遵靈樞素問仲景之論治之無功繼遵河間東垣丹溪之論投藥罔效輾轉躊躇幾至束手伏思張仲景論傷寒吳又可著瘟疫皆獨出心裁並未引古經一語余空有活人之心而無濟世之手凡遇是症必細心研究審氣血之榮枯辨經絡之通滯四十年來頗有所得欲公之天下以濟後人奈不敢以管見之學駁前人之論另立方法自取其罪友人曰真胸有確見屢驗良法補前人之缺救後人之難不但有功於後世正是前代之勳臣又何罪之有余聞斯議不揣鄙陋將男婦小兒半身不遂癱腿痿症抽搐筋攣得病之源外現之症屢驗良方難治易治之形狀及前人所論脈理臟腑經絡之錯誤一一繪圖申明其説詳述前後以俟高明再加補助於醫道豈無小補云爾半身不遂論半身不遂病本一體諸家立論竟不相同始而靈樞經曰虛邪偏客於身半其入深者內居榮衛榮衛衰則真氣去邪氣獨留發為偏枯偏枯者半身不遂也素問曰風中五臟六腑之俞所中則為偏風張仲景曰夫風之為病當令人半身不遂三書立論本源皆專主於風至劉河間出世見古人方論無功另出手眼云中風者非肝木之風內動亦非外中於風良由將息失宜內火暴甚水枯莫制心神昏昧卒倒無所知其論專主於火李東垣見河間方論矛盾又另立論曰中風者氣虛而風邪中之病在四旬以後壯盛稀有肥白氣虛者間亦有之論中有中腑中臟中血脈中經絡之分立法以本氣虛外受風邪是其本也朱丹溪見東垣方症不符又分途立論言西北氣寒有中風東南氣濕非真中風皆因氣血先虛濕生痰痰生熱熱生風也其論專主於痰濕痰是其本也王安道見丹溪論中有東南氣濕非真中風一句便云靈樞素問仲景所言是真中風河間東垣丹溪所言是類中風虞天民言王安道分真中風類中風之説亦未全是四方病此者盡因氣濕痰火挾風而作何嘗見有真中類中之分獨張景嶽有高人之見論半身不遂大體屬氣虛易中風之名著非風之論惟引用內經厥逆並辨論寒熱血虛及十二經之見症與症不符其方不效者可惜先生於此症閲歷無多其餘名家所論病因皆是因風因火因氣因痰之論所立之方俱系散風清火順氣化痰之方有云氣血虛弱而中風邪者於散風清火方中加以補氣養血之藥有云陰虛虧損而中風邪者於滋陰補腎藥內佐以順氣化痰之品或補多而攻少或補少而攻多自謂攻補兼施於心有得今人遵用仍然無效又不敢議論古人之非不曰古方不合今病便云古今元氣不同既云方不合病元氣不同何得傷寒病麻黃承氣陷胸柴胡應手取效何得中風門愈風導痰秦艽三化屢用無功總不思古人立方之本效與不效原有兩途其方效者必是親治其症屢驗之方其不效者多半病由議論方從揣度以議論揣度定論立方如何能明病之本源因何半身不遂口眼歪邪因何語言蹇澀口角流涎大便乾燥小便頻數毫無定見古今混猜以一虧損五成元氣之病反用攻發克消之方安得不錯溯本窮源非錯於醫乃錯自著書者之手嗟乎此何等事而竟以意度想當然乎哉半身不遂辨或曰半身不遂古人風火濕痰之論諸家層次議駁有證據可憑乎余曰即以仲景傷寒論中風篇云中風則令人頭疼身痛發熱惡寒乾嘔自汗金匱要略論傷風則令人鼻塞噴嚏咳嗽聲重鼻流清涕中風本門又云夫風之為病當令人半身不遂今請問何等風何等中法令人頭疼身痛發熱惡寒乾嘔自汗何等風何等中法則令人鼻塞噴嚏咳嗽聲重鼻流清涕何等風何等中法則令人半身不遂半身不遂若果是風風之中人必由皮膚入經絡亦必有由表入里之症可查嘗治此症初得時並無發熱惡寒頭疼身痛目痛鼻乾寒熱往來之表症既無表症則知半身不遂非風邪所中再者衆人風火濕痰之論立説更為含混如果是風火濕痰無論由外中由內發必歸經絡經絡所藏者無非氣血氣血若為風火濕痰阻滯必有疼痛之症有疼痛之症乃是身痛之痹症非是半身不遂半身不遂無疼痛之症余平生治之最多從未見因身痛痹症而得半身不遂者由此思之又非風火濕痰所中半身不遂本源或曰君言半身不遂虧損元氣是其本源何以虧至五成方病願聞其説余曰夫元氣藏於氣管之內分布周身左右各得其半人行坐動轉全仗元氣若元氣足則有力元氣衰則無力元氣絶則死矣若十分元氣虧二成剩八成每半身仍有四成則無病若虧五成剩五成每半身只剩二成半此時雖未病半身不遂已有氣虧之症因不疼不癢人自不覺若元氣一虧經絡自然空虛有空虛之隙難免其氣向一邊歸併如右半身二成半歸併於左則右半身無氣左半身二成半歸併於右則左半身無氣無氣則不能動不能動名曰半身不遂不遂者不遂人用也如睡時氣之歸併人不能知覺不過是醒則不能翻身惟睡醒時氣之歸併自覺受病之半身向不病之半身流動比水流波浪之聲尤甚坐時歸併身必歪倒行走時歸併半身無氣所以跌僕人便云因跌僕得半身不遂殊不知非因跌僕得半身不遂實因氣虧得半身不遂以致跌僕口眼歪斜辨或曰半身不遂既然無風如何口眼歪斜余曰古人立歪斜之名總是臨症不細心審查之故口眼歪斜並非歪斜因受病之半臉無氣無氣則半臉縮小一眼無氣力不能圓睜小眼角下抽口半邊無氣力不能開嘴角上抽上下相湊乍看似歪斜其實並非左右之歪斜嘗治此症凡病左半身不遂者歪斜多半在右病右半身不遂者歪斜多半在左此理令人不解又無書籍可考何者人左半身經絡上頭面從右行右半身經絡上頭面從左行有左右交互之義余亦不敢為定論以待高明細心審查再補又曰口眼歪斜盡屬半臉無氣乎余曰前論指兼半身不遂而言若壯盛人無半身不遂忽然口眼歪斜乃受風邪阻滯經絡之症經絡為風邪阻滯氣必不上達氣不上達頭面亦能病口眼歪斜用通經絡散風之劑一藥而愈又非治半身不遂方之所能為也辨口角流涎非痰飲或曰口角所流非痰飲乎余曰嘗治此症見所流盡是清水並非稠痰明明氣虛不固津液不明此理試看小兒氣不足時流涎者十有八九高年人氣衰時流涎者十有二三再以他症互相參看流涎者屬氣虛無疑辨大便乾燥非風火或曰患半身不遂兼大便乾燥古人名曰風燥言其病有風有火有是理乎余曰若是風火用散風清火潤燥攻下藥大便一行風散火清自當不燥嘗見治此症者誤用下藥下後乾燥更甚總不思平素出大恭時並非大恭順穀道自流乃用氣力催大恭下行既得半身不遂之後無氣力使手足動無氣力使舌言如何有氣力到下部催大恭下行以此推之非風火也乃無氣力催大恭下行大恭在大腸日久不行自乾燥也辨小便頻數遺尿不禁或曰小便頻數遺尿不禁有火有虛有分別乎余曰有溺時玉莖內疼痛尿一點一滴而出兼之色紅乃是火症若高年人或虛弱人尿長而痛其色清白乃屬氣虛溺孔開張尿流而不知名曰遺尿不禁者尿欲出而人禁止不溺尿仍自出此專指小便自病而言若半身不遂兼小便頻數遺尿不禁絶無玉莖疼痛之苦此是氣虛不固提也辨語言蹇澀非痰火或曰説話不真古名語言蹇澀前人論舌之本有痰有火此理想來不錯余曰非痰火也舌中原有兩管內通腦氣即氣管也以容氣之往來使舌動轉能言今半身無氣已不能動舌亦半邊無氣亦不能全動故説話不真試看小兒氣不足不能行走時高年人氣衰時説話俱不真是其證也辨口噤咬牙或曰既無風火如何口噤咬牙余曰口噤自是口噤咬牙自是咬牙古人以口噤咬牙混成一症何臨症粗心之甚口噤是虛咬牙是實口噤是牙緊不開咬牙是叩齒有聲在傷寒瘟疫雜症婦科有虛證口噤者有實證咬牙者獨半身不遂有口噤絶無咬牙亦有口噤太甚下牙里收其聲如銼似咬牙實非咬牙亦虛症也如無半身不遂又無他症相兼忽然口噤不開乃風邪阻滯經絡氣不上達之所致用疏通經絡之劑即愈記未病以前之形狀或曰元氣既虧之後未得半身不遂以前有虛症可查乎餘生平治之最多知之最悉每治此症愈後問及未病以前之形狀有云偶而一陳頭暈者有頭無故一陳發沉者有耳內無故一陳風響者有耳內無故一陳蟬鳴者有下眼皮常跳動者有一隻眼漸漸小者有無故一陳眼睛髮直者有眼前常見旋風者有常向鼻中攢冷氣者有上嘴唇一陳跳動者有上下嘴唇相湊發緊者有睡臥口流涎沫者有平素聰明忽然無記性者有忽然説話少頭無尾語無倫次者有無故一陳氣喘者有一手常戰者有兩手常戰者有手無名指每日有一時屈而不伸者有手大指無故自動者有胳膊無故發麻者有腿無故發麻者有肌肉無故跳動者有手指甲縫一陳陳出冷氣者有腳指甲縫一陳陳出冷氣者有兩腿膝縫出冷氣者有腳孤拐骨一陳發軟向外稜倒者有腿無故抽筋者有腳指無故抽筋者有行走兩腿如拌蒜者有心口一陳氣堵者有心口一陳發空氣不接者有心口一陳發忙者有頭項無故一陳髮直者有睡臥自覺身子沉者皆是元氣漸虧之症因不痛不癢無寒無熱無礙飲食起居人最易於疏忽論小兒半身不遂或曰小兒亦有半身不遂者余曰小兒自周歲至童年皆有突然患此症者少多半由傷寒瘟疫痘疹吐泄等症病後元氣漸虧面色青白漸漸手足不動甚至手足筋攣周身如泥塑皆是氣不達於四肢古人以風治是於此症閲歷無多癱痿論或曰元氣歸併左右病半身不遂有歸併上下之症乎余曰元氣虧五成下剩五成周流一身必見氣虧諸態若忽然歸併於上半身不能行於下則病兩腿癱痿奈古人論痿症之源因足陽明胃經濕熱上蒸於肺肺熱葉焦皮毛憔悴發為痿症概用清涼攻下之方餘論以清涼攻下之藥治濕熱腿疼痹症則可治痿症則不相宜豈知痹症疼痛日久能令腿癱癱後仍然腿疼痿症是忽然兩腿不動始終無疼痛之苦倘標本不清虛實混淆豈不遺禍後人補陽還五湯此方治半身不遂口服歪斜語言蹇澀口角流涎大便乾燥小便頻數遺尿不禁黃耆四兩生歸尾二錢赤芍一錢半地龍一錢去土川芎一錢桃仁一錢紅花一錢水煎服初得半身不遂依本方加防風一錢服四五劑後去之如患者先有入耳之言畏懼黃耆只得遷就人情用一二兩以後漸加至四兩至微效時日服兩劑豈不是八兩兩劑服五六日每日仍服一劑如已病三兩個月前醫遵古方用寒涼藥過多加附子四五錢如用散風藥過多加黨參四五錢若未服則不必加此法雖良善之方然病久氣太虧肩膀脫落二三指縫胳膊曲而搬不直腳孤拐骨向外倒啞不能言一字皆不能愈之症雖不能愈常服可保病不加重若服此方愈後藥不可斷或隔三五日吃一副或七八日吃一副不吃恐將來得氣厥之症方內黃耆不論何處所産藥力總是一樣皆可用方歌補陽還五赤芍芎歸尾通經佐地龍四兩黃耆為主藥血中瘀滯用桃紅瘟毒吐瀉轉筋説上吐下瀉轉筋一症古人立名曰霍亂宋朝太醫院立方名曰局方立藿香正氣散以治之以邪氣傷正氣之病反用攻伐正氣之藥豈不愧太醫之名至我朝道光元年歲次辛巳瘟毒流行病吐瀉轉筋者數省京都尤甚傷人過多貧不能葬埋者國家發帑施棺月餘之間費數十萬金彼時業醫者有用參朮薑附見效者便言陰寒有用芩連梔柏見效者則云毒火余曰非也不分男婦老少衆人同病乃瘟毒也或曰既是瘟毒薑附熱芩連涼皆有見效者何也余曰芩連效在初病人壯毒勝時薑附效在毒敗人弱氣衰時又曰有芩連薑附服之不效而反有害者何也余曰試看針刺而愈者所流盡是黑紫血豈不是瘟毒燒煉瘟毒自口鼻入氣管由氣管達於血管將氣血凝結壅塞津門水不得出故上吐下瀉初得用針刺其胳膊肘里彎處血管流紫黑血毒隨血出而愈或曰所刺是何穴請明白指示余曰余雖善針不必論是穴名曰尺澤人氣管周身貫通血管周身亦貫通尺澤左右四五根血管刺之皆出血皆可愈尺澤上下刺之亦可愈總之用針所刺而愈皆風火氣有餘之症不足之症愈針愈壞此針灸家隱諱而不肯言也倉卒之時用針刺取其捷便也一面針刺一面以解毒活血湯治之活其血解其毒未有不一藥而愈者但此症得之最速傷元氣最快一半日可傷生若吐瀉一兩時後或半日後一見腿抽便是腿上氣少一見胳膊抽便是胳膊上氣少如見眼胞塌陷汗出如水肢冷如冰謾言涼藥有害即余所立解毒活血湯亦有過無功此時無論舌乾口燥大渴飲冷一時飲水數碗放心用薑附回陽湯一副可奪命此法非淺醫所能知也解毒活血湯連翹二錢葛根二錢柴胡三錢當歸二錢生地五錢赤芍三錢桃仁八錢研紅花五錢枳殼一錢甘草二錢水煎服方歌解毒活血連翹桃紅花歸殼葛赤芍柴胡甘草同生地吐瀉良方用水熬此方謂初得吐瀉而言若見汗多肢冷眼塌不可用急救回陽湯若吐瀉一見轉筋身涼汗多非此方不可莫畏病人大渴飲冷不敢用黨參八錢附子八錢大片乾薑四錢白朮四錢甘草三錢桃仁二錢研紅花二錢水煎服方歌急救回陽參附薑溫中術草桃紅方見真膽雄能奪命雖有桃紅氣無傷解毒活血湯與急救回陽湯兩方界限分清未有不應手而愈者慎之慎之論小兒抽風不是風夫抽風一症今人治之不效者非今人錯治乃古方誤人古人不止論病立方誤人立病名曰抽風風之一字尤其誤人又因此症多半由傷寒瘟病或痘疹吐泄等症病久而抽則名曰慢驚風慢驚風三字相連立名更為可笑不但文義不通亦未細察病源若真是風風之中人必由皮膚入經絡亦必有由表入里之症可查既查無外感之表症古人何得著書立方總言是風其所以言風者因見其病發作之時項背反張兩目天吊口噤不開口流涎沫咽喉痰聲昏沉不省人事以為中風無疑殊不知項背反張四肢抽搐手足握固乃氣虛不固肢體也兩目天吊口噤不開乃氣虛不上升也口流涎沫乃氣虛不固津液也咽喉往來痰聲非痰也乃氣虛不歸原也如不明此理試看高年人久病壽終時或項強身重或露晴天吊或牙緊流涎或痰聲拽鋸或冷汗淋漓一派氣脫之症明明顯露以抽風之兩目天吊口噤流涎痰聲拽鋸互相參看則抽風之症氣虛無疑元氣既虛必不能達於血管血管無氣必停留而瘀以一氣虛血瘀之症反用散風清火之方安得不錯服散風藥無風服之則散氣服清火藥無火服之則血凝再服攻伐克消之方氣散血亡豈能望生溯本窮源非死於醫乃死於著書者之手每見業小兒科閲歷多者絶不誤人因抽風古方不效見抽風則棄而不治亦有高手看小兒現在之症知將來必抽風雖無方調治亦必告知病家此病恐將來抽風何以知其將來必抽風凡將欲抽風之前必先見抽風之症如見頂門下陷昏睡露睛口中搖舌不能啼哭哭無眼淚鼻孔煽動咽喉痰聲頭低不抬口噤無聲四肢冰冷口吐白沫胸高如碗喘急氣促面色青白汗出如水不能裹乳大便緑色腹內空鳴下泄上嗽肌肉跳動俱是抽風之兆前二十症不必全見但見一二症則知將來必抽其中有可治者有不可治者並所用之方皆開列於後若露睛天吊不食不哭痰鳴氣喘病雖沉重乃可治之症若天庭灰色腎子上縮或脈微細或脈全無外形雖輕乃不治之症可保立蘇湯此方治小兒因傷寒瘟疫或痘疹吐瀉等症病久氣虛四肢抽搐項背後反兩目天吊口流涎沫昏沉不省人事皆效黃耆一兩五錢生黨參三錢白朮二錢甘草二錢當歸二錢白芍二錢棗仁三錢炒山萸一錢枸杞子二錢故紙一錢核桃一個連皮打碎水煎服此方分兩指四歲小兒而言若兩歲分兩可以減半若一歲分量可用三分之一若兩三個月分兩可用四分之一又不必拘於副數余治此症一日之間常有用兩三副者服至不抽必告知病家不可因不抽遂不服藥必多服數副氣足方妥方歌可保立蘇故紙棗術歸芍藥參耆草山萸枸杞水煎服一個核桃帶殼搗論痘非胎毒夫小兒痘疹自漢至今著書立方者不可勝數大抵不過分順險逆辨別輕重死生並無一人説明痘之本源所以後人有遵保元湯用黃耆人參者有遵歸宗湯用大黃石膏者有遵解毒湯用犀角黃連者痘本一體用藥竟不相同遇順險之痘查小兒壯弱分別補瀉清涼用之皆可望生惟一見逆症遂無方調治即雲天數當然此不知痘之本源故也或曰古人若不知痘之本源如何見逆痘便知幾天死余曰此非古人知痘之本源也因看痘多知某日見苗某日何形某日何色某日何症治之不效至某日必死古人知逆痘幾天死者蓋由此也如知痘之本源豈無方調治或曰如君所言痘之逆症有救乎余曰痘之險症隨手而愈不足論至於逆症皆有本源辨明本源豈不可救如余所治悶痘不出周身攢簇細密如蠶殼平板如蛇皮不熱即出見點紫黑周身細密無縫紫白灰色相間矇頭鎖口鎖項托腮皮肉不腫通身水泡不起脹行漿不化膿結痂見點後抽風不止九竅流血鮮紅咳嗽聲啞飲水即嗆六七天作癢抓破無血七八日泄肚胃口不開至危之時頭不能抬足歪不正兩目天吊項背後反等逆症初見之時辨明虛實皆可望生易此理者知余補前人之未及救今人之疑難不明此理者妄加評論以余言為狂妄而不知非狂也知痘之本源也不似諸家議論出痘總是胎毒諸書又曰自漢以前無出痘者既云胎毒漢以前人獨非父母所生此論最為可笑若依古人之論有謂胎毒藏於臟腑而何以未出痘以前臟腑安然無病有謂胎毒藏於肌肉而何未出痘以前皮膚更不生瘡又有謂胎毒藏於骨髓或因驚恐跌僕或因傷食感冒觸動其毒發為天花信如斯言因驚恐跌僕傷食感冒觸動而發則是自不小心伏思出花正盛時非止一人出花少則一方多則數省莫非數省之人同時皆不小心此論更為無理再見世上種痘之醫所種之痘無論多少無一不順若是胎毒毒必有輕重毒重者痘必險何以能無一不順由此思之如何胎毒二字牢不可破殊不知痘非胎毒乃胞胎內血中之濁氣也兒在母腹始因一點真精凝結成胎以後生長臟腑肢體全賴母血而成胞胎內血中濁氣降生後仍藏榮血之中遇天行觸濁氣之瘟疫由口鼻而入氣管由氣管達血管將血中濁氣逐之自皮膚而出色紅似花故名天花形圓如痘故名曰痘總之受瘟疫輕瘟毒隨花而出出花必順受瘟疫重疫毒在內逗留不能隨花而出出花必險受瘟疫至重瘟疫在內燒煉其血血受燒煉其血必凝血凝色必紫血死色必黑痘之紫黑是其證也死血阻塞道路瘟疫之毒外不得由皮膚而出必內攻臟腑臟腑受毒火煎熬隨變生各臟逆症正對痘科書中所言某經逆痘不知非某經逆痘也乃某經所受之瘟毒也痘之順逆在受瘟疫之輕重治痘之緊要全在除瘟毒之方法瘟毒不除花雖少而必死瘟毒若除花雖多不致傷生痘科書中但論治胎毒而不知治瘟毒縱知治瘟毒而不知瘟毒巢穴在血若辨明瘟毒輕重血之通滯氣之虛實立救逆痘於反掌之間此所謂知其要者一言而終耳論痘漿不是血化痘出時是紅色五六天後忽變清漿次變白漿次變混漿次變黃膿終而結痂古人謂痘漿總是血化若是血化紅血必能變白色今請以血一盞試之或以礬清或以火熬能使之變清水白漿混漿黃膿乎痘本血管內血中濁氣遇天行逐濁氣之瘟疫自口鼻而入於氣管達於血管將血管中濁氣與血並氣管中津液逐之自毛孔而出所以形圓色紅五六天後痘中之血仍退還血管痘內止存濁氣津液津液清名曰清漿清漿為瘟毒燒煉稠而色白故名白漿白漿再煉再稠而混故名混漿混漿再煉稠如瘡膿故名黃膿將黃膿煉乾而結痂痘不行漿皆因血不退還血管血不退還血管皆因血管內有瘟毒燒煉血凝阻塞血之道路若通血管之瘀滯何患漿之不行論出痘飲水即嗆出痘有四五天七八天飲水即嗆者古人論毒火壅於咽喉列於不治之症總是不明咽喉左右氣門之體質舌後為喉即肺管喉後為咽即胃管咽前喉後兩邊凹處有氣管兩根名左氣門右氣門舌根有一白片其厚如錢名曰會厭正蓋肺管左右氣門上口人咽飲食必以舌尖抵上齶使會厭將肺管與左右氣門蓋嚴飲食方可過肺管左右氣門入後之胃管試看人吃飯飲食將入嗓至喉未入咽時或忽然冷笑氣暴上衝會厭一開或一粒米一滴水入左右氣門立刻由鼻嗆出是其證也今瘟毒燒煉會厭血凝不能蓋嚴氣門故飲水滲入即嗆食不嗆者因微微小縫能滲水而食不能入故不嗆化開會厭中瘀血其嗆立止論七八天痘瘡作癢痘瘡作癢者當先分明皮膚皮是皮膚是膚皮膚不分如何能明痘瘡作癢之本源如人湯燙火燒隨起一泡其薄如紙即是膚膚里肉外厚者是皮痘至六七天瘟毒濁氣津液盡歸於皮之外膚之內痘窠之中正氣虛不能達痘中行漿化膿結痂以致瘟毒外不得出膚內不得入皮毒在皮外膚里故作癢醫家遵素問諸瘡痛癢皆屬於火之句隨用清涼之品克伐生氣不但作癢不止胃氣轉傷有專用補氣者氣愈補而血愈瘀血瘀氣更不能外達於皮膚斑此時用補氣破血之劑通開血道氣直達於皮膚未有不一藥而癢即止者通經逐瘀湯此方無論痘形攢簇矇頭覆釜周身細碎成片或夾疹夾斑浮衣水泡其色或紫或暗或黑其症或乾嘔煩躁晝夜不眠逆形逆症皆是瘀血凝滯於血管並宜用此方治之其方中藥性不大寒大熱不大攻大下真是良方也桃仁八錢研紅花四錢赤芍三錢山甲四錢炒皂刺六錢連翹三錢去心地龍三錢去心柴胡一錢麝香三釐絹包水煎服大便乾燥加大黃二錢便利去之五六日後見清漿白漿將麝香去之加黃耆五錢將山甲皂刺減半至七八日後桃仁紅花亦減半黃耆可用八錢此方指四五歲而言若一二歲分兩可減半若八九歲分兩可加一半方歌通經甲皂麝香龍逐瘀赤芍桃與紅連翹柴胡毒可解便乾微用大黃攻會厭逐瘀湯此方治痘五六天後飲水即嗆桃仁五錢炒紅花五錢甘草三錢桔梗三錢生地四錢當歸二錢元參一錢柴胡一錢枳殼二錢赤芍二錢水煎服此方指五六天後嗆水而言若痘後抽風兼飲水即嗆者乃氣虛不能使會厭蓋嚴氣管照抽風方治之方歌會厭逐瘀是病源桃紅甘桔地歸元柴胡枳殼赤芍藥水嗆血凝立可痊止瀉調中湯治痘六七日後泄瀉不止或十餘日後泄瀉皆治之黃耆八錢黨參三錢甘草二錢白朮二錢當歸二錢白芍二錢川芎一錢紅花三錢附子一錢制良薑五分官桂五分去粗皮水煎服此方指痘六七天後泄瀉而言痘後抽風兼泄瀉者亦效不是初出痘泄瀉之方方歌止瀉調中參草耆術歸芍藥芎紅隨附子良薑桂少用氣虛泄瀉總相宜保元化滯湯治痘五六日後痢疾或白或紅或紅白相雜皆治黃耆一兩煎湯沖滑石一兩末晚服加白砂糖五錢更妙此方乃余之心法不獨治小兒痘症痢疾大人初痢久痢皆有奇效然大人初痢滑石用一兩五錢白糖一兩不必用黃耆久痢加黃耆滑石仍用一兩五錢方歌保元化滯補攻方一兩黃耆煎作湯為末滑石須一兩沖服痢止氣無傷助陽止癢湯治痘六七日後作癢不止抓破無血兼治失音聲啞黃耆一兩桃仁二錢研紅花二錢皂刺一錢赤芍一錢山甲一錢炒水煎服此方治痘後六七日作癢甚者抓破無血不是治初出痘一二日作癢之方方歌助陽止癢耆桃紅皂刺赤芍山甲同聲啞失音同一治表虛因裡氣不行足衛和榮湯治痘後抽風兩眼天吊項背反張口噤不開口流涎沫昏沉不省人事周身潰爛膿水直流皆治之黃耆一兩甘草二錢白朮二錢黨參三錢白芍二錢當歸一錢棗仁二錢桃仁一錢五分研紅花一錢五分水煎服此方專治痘後抽風及周身潰爛若因傷寒瘟疫雜症疾久氣虛抽風抽風門另有專方方歌足衛和榮耆草術參芍歸棗桃紅扶抽風風字前人誤服此還陽命可蘇少腹逐瘀湯説此方治少腹積塊疼痛或有積塊不疼痛或疼痛而無積塊或少腹脹滿或經血見時先腰痠少腹脹或經血一月見三五次接連不斷斷而又來其色或黯或黑或塊或崩漏兼少腹疼痛或粉紅兼白帶皆能治之效不可盡述更出奇者此方種子如神每經初見之日吃起一連吃五副不過四月必成胎必須男女年歲與月合成陽數方生子如男女兩人一單歲一雙歲必擇雙月方生子如兩單歲或兩雙歲必擇單月方生子擇月不可以初一為定準以交節為定準要知偶有經過二十日結胎者切記準日期倘月份不對生女莫謂余方不驗余用此方效不可以指屈道光癸未年直隸布政司素納公年六十因無子甚憂商之於余余曰此易事耳至六月令其如君服此方每月五副至九月懷孕至次年甲申六月二十二日生少君今七歲矣此方更有險而不險之妙孕婦體壯氣足飲食不減並無傷損三個月前後無故小産常有連傷數胎者醫書頗多仍然議論滋陰養血健脾養胃安胎保胎效方甚少不知子宮內先有瘀血占其地胎至三月再長其內無容身之地胎病靠擠血不能入胎胞從旁流而下故先見血血既不入胎胞胎無血養故小産如曾經三月前後小産或連傷三五胎今又懷胎至兩個月前後將此方服三五副或七八副將子宮內瘀血化淨小兒身長有容身之地斷不至再小産若已經小産將此方服三五副以後存胎可保無事此方去疾種子安胎盡善盡美真良善之方也少腹逐瘀湯小茴香七粒炒乾薑二分炒元胡一錢沒藥二錢研當歸三錢川芎一錢官桂一錢赤芍二錢蒲黃三錢生靈脂二錢炒水煎服方歌少腹茴香與炒薑元胡靈脂沒芎當蒲黃官桂赤芍藥種子安胎第一方懷胎説兼記難産胎衣不下方古人論胎在子宮分經輪養一月肝經養二月膽經養三月心經養四月三焦養五月脾經養六月胃經養七月肺經養八月大腸養九月腎經養若依其論胎至兩月自當肝經交代膽經接班此論實在無情無理兒在母腹全賴母血而成一言可了何必圖取虛名故作欺人之論又如子啼門云兒在母腹口含臍帶疙瘩吮血養生請問初結胎無口時又以何物吮血養生既不明白何不歸而謀諸婦訪問收生婆訪問的確再下筆斷不致遺笑後人豈知結胎一月之內並無胎衣一月後兩月內始生胎衣胎衣既成兒體已定胎衣分兩段一段厚是雙層其內盛血一段薄是單層其內存胎厚薄之間夾縫中長一管名曰臍帶下連兒臍母血入胎衣內盛血處轉入臍帶長臟腑肢體周身齊長並非先長某臟後長某腑一月小産者並無胎衣兩月小産者有胎衣形如稱錘上小下大不過是三指長短三月小産者耳目口鼻俱備惟手足有拳不分指至月足臨生時兒蹬破胎衣頭轉向下而生胎衣隨胎而下胎衣上之血隨胎衣而下此其長也最關緊要是難産古人原有開骨散服之有效者有不效者其方總論活血開骨不重用力勞乏佘每用開骨散重加黃耆不過一時胎即下至胎衣不下古人原有沒竭散始而用之有效與不效繼而加倍用之胎衣立下藥味要緊分量更要緊古開骨散治難産當歸一兩川芎五錢龜板八錢血餘一團燒灰加黃耆四兩生水煎服古沒竭散治胎衣不下沒藥三錢血竭三錢為末滾水調服黃耆桃紅湯治産後抽風兩目天吊口角流涎項背反張昏沉不省人事黃耆八兩生桃仁三錢研紅花二錢水煎服婦科以濟陰綱目為最醫宗金鑑擇其方論纂為歌訣令人易讀易記惟抽風一症方不效余已補之古下瘀血湯治血鼓何以知是血鼓腹皮上有青筋是血鼓腹大桃仁八錢大黃五分蟅蟲三個甘遂五分為末沖服或八分水煎服與前膈下逐瘀湯輪流服之安抽葫蘆酒治腹大周身腫自抽乾葫蘆焙為末黃酒調服三錢若葫蘆大以黃酒入內煮一時服酒頗效取其自抽之義蜜蔥豬膽湯治通身腫肚腹不大豬膽一個取汁白蜜四兩四錢調和一處蔥頭四個帶白一寸黃酒半斤用酒煎蔥兩三沸將酒衝入蜜膽內服之立效刺蝟皮散治遺精夢而後遺不夢而遺虛實皆效刺蝟皮一個瓦上焙乾為末黃酒調早服實在效真難吃小茴香酒治白濁俗名騙白又名下淋精道受風寒藥全不效小茴香一兩炒黃為粗末黃酒半斤燒滾沖停一刻去渣服酒痹症有瘀血説凡肩痛臂痛腰疼腿疼或周身疼痛總名曰痹症明知受風寒有溫熱發散藥不愈明知有濕熱用利濕降火藥無功久而肌肉消瘦議論陰虧遂用滋陰藥又不效至此便云病在皮脈易於為功病在筋骨實難見效因不思風寒濕熱入皮膚何處作痛入於氣管痛必流走入於血管痛不移處如論虛弱是因病而致虛非因虛而致病總滋陰外受之邪歸於何處總逐風寒去濕熱已凝之血更不能活如水遇風寒凝結成冰冰成風寒已散明此義治痹症何難古方頗多如古方治之不效用身痛逐瘀湯秦艽一錢川芎二錢桃仁三錢紅花三錢甘草二錢羌活一錢沒藥二錢當歸三錢靈脂二錢炒香附一錢牛膝三錢地龍二錢去土若微熱加蒼朮黃柏若虛弱量加黃耆一二兩方歌身痛逐瘀膝地龍羌秦香附草歸芎黃耆蒼柏量加減要緊五靈桃沒紅硇砂丸治瘰癧鼠瘡滿項滿胸破爛流膿無不應手取效硇砂二錢研細皂角子一百個乾醋一斤前二味入醋內浸三日入砂鍋內熬之將干將鍋底硇砂拌於皂子上候乾以微火焙乾或以爐臺上炕之每晚嚼五粒或八粒一日早晚或吃兩次以滾水送然干則皂子過硬為末服亦可方內硇砂有紅白二種余所用是紅色者未知白色硇砂功效若何硇砂紅色者出庫車北山洞中夏令從洞中出火人不能近前冬令回民赤身近洞取之本草言西域鹽滷熬成者誤也癲狂夢醒湯癲狂一症哭笑不休詈罵歌唱不避親疏許多惡態乃氣血凝滯腦氣與臟腑氣不接如同作夢一樣桃仁八錢柴胡三錢香附二錢木通三錢赤芍三錢半夏二錢腹皮三錢青皮二錢陳皮三錢桑皮三錢蘇子四錢研甘草五錢水煎服方歌癲狂夢醒桃仁功香附青柴半木通陳腹赤桑蘇子炒倍加甘草緩其中龍馬自來丹馬錢子八兩地龍八條去土焙乾為末香油一斤將香油入鍋內熬滾入馬錢子炸之待馬錢子微有響爆之聲拿一個用刀切兩半看其內以紫紅色為度研為細末再入前地龍末和均麵糊為丸緑豆大每副吃三四分臨臥服鹽水送若五六歲小兒服二分紅糖水送如不為丸面子亦可服如吃齋人去地龍亦可治癇症俗名羊羔風每晚先服黃耆赤風湯一副臨臥服丸藥一副吃一月後不必服湯藥淨吃丸藥久而自愈愈後將丸藥再吃一二年可保除根病源記前腦髓説中黃耆赤風湯黃耆二兩生赤芍一錢防風一錢水煎服小兒減半治癱腿多用一分服後以腿自動為準不可再多如治諸瘡諸病或因病虛弱服之皆效無病服之不生疾病總書數篇不能言盡其妙此方治諸病皆效者能使周身之氣通而不滯血活而不瘀氣通血活何患疾病不除黃耆防風湯治脫肛不論十年八年皆有奇效黃耆四兩生防風一錢小兒減半水煎服黃耆甘草湯治老年人溺尿玉莖痛如刀割不論年月深久立效黃耆四兩生甘草八錢水煎服病重一日兩副木耳散治潰爛諸瘡效不可言不可輕視此方木耳一兩焙乾研末白砂糖一兩和均以溫水浸如糊敷之縛之此方與刺蝟皮治遺精抽葫蘆治鼓症義同明此義方可以學醫玉龍膏即勝玉膏治跌打損傷貼之頗效香油一斤白蘞升麻當歸川芎連翹銀花甲片川烏象皮各四錢乳香一錢半末沒藥一錢半末輕粉三錢末冰片三分末麝香三分末白占二兩將前九味藥入油內炸枯色去渣入官粉三合離火再入乳沒冰片麝攪均再將白占入於內攤貼之此膏去官粉即糕子藥貼破爛諸瘡其效如神木耳散玉龍膏潰爛諸瘡可靠之良方也不可輕視辨方效經錯之源論血化為汗之誤胞侄作礪來京見臟腑圖記問曰伯父所繪之圖經絡是氣管皆本於衛總管由衛總管散布周身是周身經絡通連並非各臟腑長兩經侄思古人若不明經絡何以張仲景著傷寒按足六經之現症立一百一十三方分三百九十七法其方效者頗多侄不解其理余曰爾看其首篇細心研究便知其方效論錯之理如首篇論足太陽膀胱經為寒邪所傷則令人頭疼身痛項強發熱惡寒乾嘔無汗用麻黃湯治之若諸症如前而有汗是傷風用桂枝湯治之所論是足太陽經足太陽專通兩足而不通兩手其論傳邪傳足六經不傳手六經爾看初得傷寒頭疼身痛項強發熱惡寒未有兩胳膊兩手不疼痛發熱惡寒者用麻黃湯亦未有周身皆愈而獨不愈兩胳膊兩手者豈不是方雖效而論經絡實錯之明證若仲景以前有人親見臟腑著明經絡貫通仲景著傷寒必言外感寒邪入周身之經絡用麻黃湯發散周身之寒邪一言可了論有汗是傷風以桂枝湯治之以桂枝白芍甘草三味然從未見治愈一人桂枝湯所以不見效者因頭疼身痛發熱有汗非傷風症也乃吳又可所論之瘟疫也又問寒邪在表自當見頭疼身痛發熱惡寒無汗之表症初得傷寒尚未傳裡如何即有作嘔之裡症仲景著論王叔和等數十人注釋並未説明表症作嘔之所以然侄實不能明白求伯父明白指示余始看爾不過有讀書之志而無業醫之才今據爾此問尚有思路將來不敢粗心輕忽人命爾問寒邪在表如何有作嘔之裡症余詳細告汝寒邪始入毛孔由毛孔入皮膚由皮膚入絲絡由絲絡入陽絡由陽絡入經由經入衛總管由衛總管橫行入心由心上行入入左右氣管由左右氣管上攻左右氣門故作嘔此表症所以作嘔之本源也用麻黃湯服之入胃其藥汁由津門流出入津管過肝入脾中之瓏管從出水道滲出沁入膀胱為尿其藥之氣即藥之性由津管達衛總管由衛總管達經由經達絡由絡達絲絡由絲絡達皮膚由皮膚達毛孔將寒邪逐之自毛孔而出故發汗邪隨汗出汗出邪散故嘔即止此周身經絡內外貫通用麻黃湯發散表邪隨汗而出之次第也又問仲景論目痛鼻乾不得眠是足陽明胃經之表症以葛根湯治之其方內有葛根仍有麻黃此理不甚明白余曰寒邪由表入經絡正氣將寒邪化而為熱故名曰邪熱邪熱上攻頭頂腦為邪熱所擾故不得眠目系通於腦邪熱由腦入目故目痛鼻通於腦邪熱由腦入鼻故鼻乾明是邪熱上攻之火症並非足陽明胃經之表寒用葛根而愈者莫謂葛根是溫散之品葛根乃清散之藥也其方內用麻黃者發散在表未化之寒邪也此又是方效經絡錯之明證又問仲景論胸脅痛耳聾口苦寒熱往來而嘔其症在半表半裡是足少陽膽經之症用小柴胡湯治之其方神效侄思此症若不在膽經其方又神效若在膽經膽又居膈膜之下又痛又在胸脅此一段侄又不明白余曰爾看臟腑圖膈膜以上之血府便明白邪熱入於血府攻擊其血故胸脅作痛邪向血內攻血向外抗拒一攻一拒故寒熱往來熱灼左右氣門氣上下不通故嘔而口苦邪熱上攻故耳聾目眩柴胡能解血府之熱熱解汗自出邪隨汗解故效甚速此亦是方效論經錯之明證至傳變多端總不外表裡虛實爾若明傷寒須看吳又可之瘟疫若見書少必有偏寒偏熱之弊昨晚爾當客問古人言汗在皮膚是血發於皮膚外是汗言汗即血化此理爾不解彼時不告汝者非謂爾當客多言因客粗知醫並非名手故不當客告汝汗即血化此丹溪朱震亨之論張景嶽雖議駁其非究竟不能指實出汗之本源古人立論之錯錯在不知人氣血是兩管氣管通皮膚有孔竅故發汗血管通皮膚無孔竅故不發汗何以知血管通皮膚無孔竅爾看生瘡破流黃水者其毒由氣管而來每日常流黃水其皮膚不紅瘡毒若在血管初起皮膚必紅必待皮膚潰爛所流必是膿血爾再看瘟毒發斑出疹小兒出痘色雖紅而不流血豈不是血管通皮膚無孔竅之明證乎侄作礪來京因間談問余彼時是書業已刻成故書於卷末以記之
